<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Você recebe o nome do circuito de F1. Consegue desenhar o traçado perfeito? No F1 Track Draw Game, seu desenho é sobreposto à pista real e pontuado pela precisão. Um desafio diário de desenho e memória para fãs de Fórmula 1. Teste sua mira! 🏁">
    
    <meta name="keywords" content="F1 Track Draw Game, jogo de desenho F1, desafio diário, círculo perfeito, pistas de fórmula 1, jogo de precisão, desenhar circuito, f1 game, wordle f1, jogo de memória f1, automobilismo">
    
    <meta name="robots" content="index, follow">
    <title>F1 Track Draw</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    
    <header>
        <h1>F1 Track Draw</h1>
        <p class="track-name">Pista: <span id="track-name">Monaco</span></p>
    </header>

    
    <main>

        <div id="instructions">
            <p>Desenhe o traçado da pista com o mouse.</p>
            <p>Volte ao ponto inicial para fechar o loop!</p>
        </div>

        
        <canvas id="game-canvas" width="800" height="550">
            Seu navegador não suporta Canvas. Por favor, use Chrome, Firefox ou Safari.
        </canvas>

        
        <div id="score-display" class="hidden">
            <span id="score-label">Sua pontuação:</span>
            <span id="score-value">0%</span>
            <span id="score-feedback">—</span>
        </div>

        <!-- CONTROLES: Botões de ação -->
        <div id="controls">
            <button id="btn-clear">🔄 Nova Tentativa</button>
            <button id="btn-show-template" disabled>👁 Ver Gabarito</button>
        </div>

        <div id="state-indicator">
            Estado: <span id="current-state">READY</span>
        </div>

    </main>

    <footer>
        <p>CS50 Final Project · 2025</p>
        <a href="/tracks-generator/tracks-generator.html">Generate a new track</a>
    </footer>

    <script src="tracks.js"></script>
    <script src="script.js"></script>

</body>
</html>
